<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustavo Placares</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        /* Cabeçalho do Site */
        header {
            background-color: #2e8b57;
            padding: 15px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 22px;
            color: white;
        }
        /* Painel Letreiro Estilo Estádio */
        .marquee-container {
            background-color: #111;
            color: #ffcc00;
            padding: 10px 0;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 2px solid #2e8b57;
            overflow: hidden;
            white-space: nowrap;
        }
        /* Botões de Filtro de Status */
        .filters {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            background-color: #1a1a1a;
            overflow-x: auto;
        }
        .filters button {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .filters button:hover {
            background-color: #2e8b57;
        }
        /* Botões de Áudio Horizontais */
        .audio-buttons {
            display: flex;
            justify-content: flex-start;
            gap: 6px;
            padding: 10px;
            background-color: #1a1a1a;
            border-top: 1px solid #333;
            overflow-x: auto;
            white-space: nowrap;
        }
        .audio-buttons button {
            background-color: #2e8b57;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚽ Gustavo Placares</h1>
    </header>

    <div class="marquee-container">
        <marquee behavior="scroll" direction="left" scrollamount="5">
            ⚽ Bem-vindo ao Gustavo Placares! Acompanhe os principais jogos em destaque de hoje e amanhã. Dados de futebol fornecidos por football-data.org. ⚽
        </marquee>
    </div>

    <div class="filters">
        <button onclick="filtrar('ALL')">Todos</button>
        <button onclick="filtrar('LIVE')">🔴 Ao Vivo</button>
        <button onclick="filtrar('TIMED')">📅 Hoje</button>
        <button onclick="filtrar('FINISHED')">✔ Finalizados</button>
    </div>

    <div class="audio-buttons">
        <button onclick="tocarAudio('que site é esse _.mp3')">
            🗣 Que site é esse?
        </button>
        <button onclick="tocarAudio('explicação.mp3')">
            🗣 Porque aparece poucos jogos?
        </button>
        <button onclick="tocarAudio('como foi feito o site _.mp3')">
            🗣 Como foi feito o site?
        </button>
    </div>

    <div id="jogos" style="padding: 10px; text-align: center;">
        <h3 style="color: #fff; margin-top: 20px;">Entrando em campo 🏟️ Aguarde...</h3>
    </div>

    <footer style="text-align: center; padding: 20px 10px; color: #888; font-size: 12px; background-color: #121212; border-top: 1px solid #222; margin-top: 30px;">
        <p style="margin: 0;">
            Dados de futebol fornecidos por 
            <a href="https://www.football-data.org/client/home" target="_blank" style="color: #2e8b57; text-decoration: none; font-weight: bold;">
                football-data.org
            </a>
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
