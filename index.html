<html lang="pt-br">

    <div id="telaEntrada" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#121212;display:flex;justify-content:center;align-items:center;z-index:9999;">
        <div style="text-align:center;color:white;padding:20px;">
            <div style="font-size:80px;">⚽</div>
            <h1>Gustavo Placares</h1>
            <p style="color:#bbb;margin:20px 0;">
                Acompanhe os jogos em destaque do futebol.
            </p>
            <button id="btnEntrar" style="padding:15px 40px;font-size:20px;background:#2e7d32;color:white;border:none;border-radius:10px;cursor:pointer;">
                VER PLACARES
            </button>
        </div>
    </div>

    <audio id="audioAbertura">

    </audio>

    <header>
        <div class="logo-container">
            <span class="emoji-logo">⚽</span>
            <h1>Gustavo Placares</h1>
        </div>
        <input type="text" id="pesquisa" placeholder="Pesquisar time...">
    </header>

    <nav class="filtros">
        <button onclick="filtrar('ALL')" class="btn-filtro active">Todos</button>
        <button onclick="filtrar('LIVE')" class="btn-filtro">🔴 Ao Vivo</button>
        <button onclick="filtrar('TIMED')" class="btn-filtro">📅 Hoje</button>
        <button onclick="filtrar('FINISHED')" class="btn-filtro">✔ Finalizados</button>
    </nav>

    <main id="jogos">
        <div style="text-align:center;color:#888;margin-top:50px;font-size:18px;font-weight:bold;">
            Entrando em campo 🏟️ Aguarde...
        </div>
    </main>

    <script src="script.js"></script>

</body>
