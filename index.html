<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustavo Placares</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tela de entrada -->
    <div id="telaEntrada" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#121212;display:flex;justify-content:center;align-items:center;z-index:9999;">

        <div style="text-align:center;color:white;padding:20px;position:relative;z-index:99998;">

            <div style="font-size:80px;">⚽</div>

            <h1>Gustavo Placares</h1>

            <p style="color:#bbb;margin:20px 0;">
                Acompanhe os jogos em destaque do futebol.
            </p>

            <!-- O clique agora é direto aqui, forçando a tela a sumir e tocando o som -->
            <button id="btnEntrar" 
                    onclick="document.getElementById('telaEntrada').style.display='none'; sessionStorage.setItem('gustavoPlacares_entrou_sessao', 'true'); document.getElementById('audioAbertura').play().catch(e=>console.log(e));" 
                    style="padding:15px 40px;font-size:20px;background:#2e7d32;color:white;border:none;border-radius:10px;cursor:pointer;position:relative;z-index:99999;">
                VER PLACARES
            </button>

        </div>

    </div>

    <audio id="audioAbertura">
        <source src="abertura.mp3" type="audio/mpeg">
    </audio>

    <header>
        <div class="logo-container">
            <span class="emoji-logo">⚽</span>
            <h1>Gustavo Placares</h1>
        </div>

        <input type="text" id="pesquisa" placeholder="Pesquisar time...">
    </header>

    <nav class="filtros">
        <button onclick="filtrar('ALL')" class="btn-filtro active">Todos</button>
        <button onclick="filtrar('LIVE')" class="btn-filtro">🔴 Ao Vivo</button>
        <button onclick="filtrar('TIMED')" class="btn-filtro">📅 Hoje</button>
        <button onclick="filtrar('FINISHED')" class="btn-filtro">✔ Finalizados</button>
    </nav>

    <main id="jogos">
        <div style="text-align:center;color:#888;margin-top:50px;font-size:18px;font-weight:bold;">
            Entrando em campo 🏟️ Aguarde...
        </div>
    </main>

    <script src="script.js?v=3"></script>

</body>
</html>
