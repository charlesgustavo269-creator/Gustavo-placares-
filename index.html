<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustavo Placares</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Cabeçalho igual ao seu site */
        .header-container { background: #20b2aa; padding: 20px; border-radius: 0 0 20px 20px; text-align: center; }
        .header-container h1 { margin: 0 0 15px 0; color: white; }
        #filtroBusca { width: 90%; padding: 12px; border-radius: 10px; border: none; outline: none; margin-bottom: 15px; }
        
        /* Filtros */
        .filtros { display: flex; justify-content: center; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .filtros button { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; white-space: nowrap; }
        .filtros button:hover { background: #444; }

        /* Estilo dos cards */
        #jogos { padding: 10px; }
        .jogo-card { background: #1e1e1e; margin: 15px 0; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>⚽ Gustavo Placares</h1>
        <input type="text" id="filtroBusca" placeholder="Pesquisar time...">
        
        <div class="filtros">
            <button onclick="filtrar('todos')">Todos</button>
            <button onclick="filtrar('vivo')">🔴 Ao Vivo</button>
            <button onclick="filtrar('hoje')">📅 Hoje</button>
            <button onclick="filtrar('finalizado')">✔ Finalizados</button>
        </div>
    </div>

    <!-- Área onde os jogos serão carregados -->
    <div id="jogos">
        <div style="text-align: center; color: white; margin-top: 50px;">
            <p>Entrando em campo 🏟</p>
            <p>Aguarde...</p>
        </div>
    </div>

    <!-- Link para o seu script -->
    <script src="script.js"></script>
</body>
</html>
