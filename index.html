<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustavo Placares</title>
    <!-- Se você tiver um arquivo style.css, mantenha esta linha. 
         Se não, você pode colocar o estilo aqui dentro futuramente -->
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #121212; color: white; font-family: sans-serif; margin: 0; padding: 0;">

    <div id="container-conteudo">
        <header style="background-color: #20b2aa; padding: 20px; text-align: center;">
            <div class="logo-container">
                <span class="emoji-logo" style="font-size: 30px;">⚽</span>
                <h1 style="margin: 10px 0 0 0; font-size: 24px;">Gustavo Placares</h1>
            </div>
            <input type="text" id="pesquisa" placeholder="Pesquisar time..." style="margin-top: 15px; padding: 10px; width: 80%; border-radius: 20px; border: none;">
        </header>

        <main id="jogos">
            <!-- Esta mensagem é o que aparece enquanto carrega -->
            <div id="status-msg" style="text-align:center; color:#888; margin-top:50px; font-size: 18px;">
                Entrando em campo... 🏟️
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
