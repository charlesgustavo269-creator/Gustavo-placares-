<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustavo placares</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Áudio de abertura do site -->
    <audio id="audioAbertura" src="abertura.mp3"></audio>

    <header>
        <div class="logo-container">
            <span class="emoji-logo">⚽</span>
            <h1>Gustavo placares</h1>
        </div>

        <input type="text" id="pesquisa" placeholder="Pesquisar time...">
    </header>

    <nav class="filtros">
        <button onclick="filtrar('ALL')" class="btn-filtro active">Todos</button>
        <button onclick="filtrar('LIVE')" class="btn-filtro">🔴 Ao Vivo</button>
        <button onclick="filtrar('TIMED')" class="btn-filtro">📅 Hoje</button>
        <button onclick="filtrar('FINISHED')" class="btn-filtro">✔ Finalizados</button>
    </nav>

    <main id="jogos">
        <div style="text-align: center; color: #888; margin-top: 50px; font-size: 18px; font-weight: bold;">
            Entrando em campo 🏟️ Aguarde...
        </div>
    </main>


    <script>
        window.addEventListener("load", function() {
            const audio = document.getElementById("audioAbertura");

            audio.play().catch(() => {
                console.log("O navegador bloqueou o áudio automático.");
            });
        });
    </script>

    <script src="script.js"></script>

</body>
</html>
